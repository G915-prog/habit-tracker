<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #21212e;
    --border: rgba(139,92,246,0.13);
    --accent: #8b5cf6;
    --accent-dim: rgba(139,92,246,0.18);
    --accent-glow: rgba(139,92,246,0.35);
    --green: #22c55e;
    --green-glow: rgba(34,197,94,0.18);
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --danger: #ef4444;
    --danger-dim: rgba(239,68,68,0.12);
    --radius: 16px;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(139,92,246,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 85% 60%, rgba(139,92,246,0.06) 0%, transparent 50%);
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    margin-bottom: 2.5rem;
    animation: fadeDown 0.5s ease both;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.25rem;
  }

  h1 {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #c4b5fd 0%, #8b5cf6 50%, #6d28d9 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .today-date {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* SUMMARY */
  .summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    animation: fadeDown 0.5s 0.08s ease both;
  }

  .summary-label {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 0.65rem;
    letter-spacing: 0.04em;
  }

  .summary-count {
    font-family: var(--font-display);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.9rem;
    letter-spacing: -0.02em;
  }

  .summary-count span {
    color: var(--accent);
  }

  .progress-track {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #6d28d9, #8b5cf6, #a78bfa);
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 0 10px var(--accent-glow);
  }

  /* ADD HABIT */
  .add-section {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 1.75rem;
    animation: fadeDown 0.5s 0.14s ease both;
  }

  .add-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1.1rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .add-input::placeholder { color: var(--muted); }

  .add-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 0.85rem 1.3rem;
    font-family: var(--font-display);
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 14px rgba(139,92,246,0.3);
  }

  .add-btn:hover {
    background: #7c3aed;
    box-shadow: 0 4px 20px rgba(139,92,246,0.5);
    transform: translateY(-1px);
  }

  .add-btn:active { transform: translateY(0); }

  /* ERROR */
  .error-msg {
    color: var(--danger);
    font-size: 0.8rem;
    font-weight: 500;
    margin-top: -1.1rem;
    margin-bottom: 1rem;
    padding-left: 0.3rem;
    min-height: 1rem;
    transition: opacity 0.3s;
    animation: shake 0.3s ease;
  }

  /* HABITS LIST */
  #habits-list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 3.5rem 1rem;
    animation: fadeDown 0.5s ease both;
  }

  .empty-icon {
    font-size: 2.8rem;
    margin-bottom: 1rem;
    display: block;
  }

  .empty-state p {
    color: var(--muted);
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.6;
  }

  .empty-state strong {
    color: var(--text);
    font-weight: 500;
  }

  /* HABIT CARD */
  .habit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
    animation: slideIn 0.35s cubic-bezier(0.34,1.2,0.64,1) both;
    position: relative;
    overflow: hidden;
  }

  .habit-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--green-glow);
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
    border-radius: var(--radius);
  }

  .habit-card.done {
    border-color: rgba(34,197,94,0.3);
    box-shadow: 0 0 20px rgba(34,197,94,0.1), inset 0 0 20px rgba(34,197,94,0.03);
  }

  .habit-card.done::before { opacity: 1; }

  /* CHECKBOX */
  .habit-check {
    appearance: none;
    -webkit-appearance: none;
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }

  .habit-check:hover { border-color: var(--green); transform: scale(1.08); }

  .habit-check:checked {
    background: var(--green);
    border-color: var(--green);
    animation: pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .habit-check:checked::after {
    content: '';
    position: absolute;
    width: 6px;
    height: 10px;
    border-right: 2.5px solid #fff;
    border-bottom: 2.5px solid #fff;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  /* HABIT INFO */
  .habit-info {
    flex: 1;
    min-width: 0;
  }

  .habit-name {
    font-family: var(--font-display);
    font-size: 0.97rem;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.01em;
    transition: color 0.2s;
  }

  .habit-card.done .habit-name { color: var(--green); }

  .habit-streak {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 400;
    margin-top: 0.2rem;
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  .habit-streak .fire {
    font-size: 0.85rem;
    filter: drop-shadow(0 0 4px rgba(251,146,60,0.5));
  }

  .habit-streak.hot { color: #fb923c; font-weight: 500; }

  /* DELETE */
  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  .delete-btn:hover {
    color: var(--danger);
    background: var(--danger-dim);
    transform: scale(1.1);
  }

  .delete-btn svg { width: 16px; height: 16px; }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px) scale(0.97); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }

  @keyframes slideOut {
    to { opacity: 0; transform: translateX(20px) scale(0.95); max-height: 0; padding: 0; margin: 0; }
  }

  @keyframes pop {
    0%   { transform: scale(0.8); }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  /* RESPONSIVE */
  @media (max-width: 420px) {
    .add-btn { padding: 0.85rem 1rem; font-size: 0.82rem; }
    .habit-name { font-size: 0.9rem; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-top">
      <h1>Habits</h1>
      <span class="today-date" id="today-label"></span>
    </div>
  </header>

  <div class="summary" id="summary">
    <div class="summary-label">TODAY'S PROGRESS</div>
    <div class="summary-count" id="summary-count"><span>0</span> / 0 habits done</div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="add-section">
    <input
      class="add-input"
      id="habit-input"
      type="text"
      placeholder="e.g. Drink 2L water, Meditate..."
      maxlength="60"
      autocomplete="off"
    />
    <button class="add-btn" id="add-btn">+ Add</button>
  </div>
  <div class="error-msg" id="error-msg" style="display:none"></div>

  <div id="habits-list"></div>

</div>

<script>
  // ── Storage helpers ─────────────────────────────────────────────────────────
  const STORAGE_KEY = 'ht_v2_data';

  function loadData() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }

  function saveData(d) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
  }

  // ── Date helpers ─────────────────────────────────────────────────────────────
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function prevDayStr(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatDisplayDate(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric', year:'numeric' });
  }

  // ── State ────────────────────────────────────────────────────────────────────
  // data shape: { habits: [{ id, name, streak, lastChecked, createdAt }] }
  let state = loadData();
  if (!state.habits) state.habits = [];

  const TODAY = todayStr();

  // Streak integrity check: if a habit's lastChecked isn't yesterday or today, reset streak
  state.habits.forEach(h => {
    if (h.lastChecked && h.lastChecked !== TODAY && h.lastChecked !== prevDayStr(TODAY)) {
      h.streak = 0;
    }
  });
  saveData(state);

  // ── DOM refs ─────────────────────────────────────────────────────────────────
  const listEl    = document.getElementById('habits-list');
  const inputEl   = document.getElementById('habit-input');
  const addBtn    = document.getElementById('add-btn');
  const errEl     = document.getElementById('error-msg');
  const countEl   = document.getElementById('summary-count');
  const fillEl    = document.getElementById('progress-fill');
  const todayLbl  = document.getElementById('today-label');

  todayLbl.textContent = formatDisplayDate(TODAY);

  // ── Render ───────────────────────────────────────────────────────────────────
  function render() {
    listEl.innerHTML = '';

    if (state.habits.length === 0) {
      listEl.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">✨</span>
          <p><strong>Add your first habit to get started</strong><br>
          Track daily actions, build streaks,<br>and become unstoppable.</p>
        </div>`;
      updateSummary();
      return;
    }

    state.habits.forEach(h => {
      const done = h.lastChecked === TODAY;
      const card = document.createElement('div');
      card.className = 'habit-card' + (done ? ' done' : '');
      card.dataset.id = h.id;

      const streakHot = h.streak >= 3;

      card.innerHTML = `
        <input type="checkbox" class="habit-check" ${done ? 'checked' : ''} aria-label="Mark ${escHtml(h.name)} done">
        <div class="habit-info">
          <div class="habit-name">${escHtml(h.name)}</div>
          <div class="habit-streak ${streakHot ? 'hot' : ''}">
            <span class="fire">🔥</span>${h.streak} day streak
          </div>
        </div>
        <button class="delete-btn" aria-label="Delete ${escHtml(h.name)}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>`;

      // Checkbox handler
      card.querySelector('.habit-check').addEventListener('change', e => {
        toggle(h.id, e.target.checked);
      });

      // Delete handler
      card.querySelector('.delete-btn').addEventListener('click', () => {
        deleteHabit(h.id, card);
      });

      listEl.appendChild(card);
    });

    updateSummary();
  }

  function updateSummary() {
    const total = state.habits.length;
    const done  = state.habits.filter(h => h.lastChecked === TODAY).length;
    const pct   = total ? Math.round((done / total) * 100) : 0;

    countEl.innerHTML = `<span>${done}</span> / ${total} habits done today`;
    fillEl.style.width = pct + '%';
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Actions ──────────────────────────────────────────────────────────────────
  function addHabit() {
    const name = inputEl.value.trim();
    if (!name) { showError('Please enter a habit name.'); return; }
    if (state.habits.some(h => h.name.toLowerCase() === name.toLowerCase())) {
      showError('This habit already exists!'); return;
    }
    hideError();

    const habit = { id: Date.now().toString(36), name, streak: 0, lastChecked: null, createdAt: TODAY };
    state.habits.push(habit);
    saveData(state);
    inputEl.value = '';
    render();
    // Scroll last card into view
    const cards = listEl.querySelectorAll('.habit-card');
    if (cards.length) cards[cards.length-1].scrollIntoView({ behavior:'smooth', block:'nearest' });
  }

  function toggle(id, checked) {
    const h = state.habits.find(x => x.id === id);
    if (!h) return;

    if (checked) {
      const prevWasYesterday = h.lastChecked === prevDayStr(TODAY);
      h.streak = prevWasYesterday ? h.streak + 1 : 1;
      h.lastChecked = TODAY;
    } else {
      // Uncheck: revert streak
      h.streak = Math.max(0, h.streak - 1);
      h.lastChecked = h.streak > 0 ? prevDayStr(TODAY) : null;
    }

    saveData(state);

    // Update card in-place (no full re-render for smoothness)
    const card = listEl.querySelector(`[data-id="${id}"]`);
    if (card) {
      card.classList.toggle('done', checked);
      card.querySelector('.habit-streak').className = 'habit-streak' + (h.streak >= 3 ? ' hot' : '');
      card.querySelector('.habit-streak').innerHTML = `<span class="fire">🔥</span>${h.streak} day streak`;
    }
    updateSummary();
  }

  function deleteHabit(id, cardEl) {
    cardEl.style.animation = 'slideOut 0.3s ease forwards';
    cardEl.style.overflow = 'hidden';
    setTimeout(() => {
      state.habits = state.habits.filter(h => h.id !== id);
      saveData(state);
      render();
    }, 280);
  }

  // ── Error display ─────────────────────────────────────────────────────────────
  let errorTimer;
  function showError(msg) {
    errEl.textContent = msg;
    errEl.style.display = 'block';
    clearTimeout(errorTimer);
    errorTimer = setTimeout(hideError, 3000);
    inputEl.focus();
  }
  function hideError() {
    errEl.style.display = 'none';
    errEl.textContent = '';
  }

  // ── Event listeners ──────────────────────────────────────────────────────────
  addBtn.addEventListener('click', addHabit);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });
  inputEl.addEventListener('input', hideError);

  // ── Midnight reset ───────────────────────────────────────────────────────────
  function scheduleMidnightReset() {
    const now = new Date();
    const midnight = new Date(now);
    midnight.setHours(24, 0, 0, 0);
    const msUntilMidnight = midnight - now;
    setTimeout(() => {
      // Streak integrity on reset
      const newToday = todayStr();
      state = loadData();
      state.habits.forEach(h => {
        if (h.lastChecked && h.lastChecked !== newToday && h.lastChecked !== prevDayStr(newToday)) {
          h.streak = 0;
        }
      });
      saveData(state);
      todayLbl.textContent = formatDisplayDate(newToday);
      render();
      scheduleMidnightReset();
    }, msUntilMidnight + 500);
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  render();
  scheduleMidnightReset();
</script>
</body>
</html>
