<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --surface2: #1c1c1c;
    --surface3: #252525;
    --border: rgba(255,255,255,0.06);
    --border-hi: rgba(255,255,255,0.13);
    --red: #dc2626;
    --red-dim: rgba(220,38,38,0.12);
    --red-hi: #ef4444;
    --yellow: #ca8a04;
    --yellow-hi: #eab308;
    --text: #ededed;
    --text2: #888;
    --muted: #444;
    --radius: 9px;
    --font: 'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 2.5rem 1rem 5rem;
  }

  .container { max-width: 560px; margin: 0 auto; }

  /* HEADER */
  header { margin-bottom: 1.75rem; }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.04em;
    color: var(--text);
  }

  h1 .dot { color: var(--red); }

  .today-date {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* SUMMARY */
  .summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    margin-bottom: 1.1rem;
  }

  .summary-label {
    font-size: 0.68rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .summary-count {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.65rem;
    letter-spacing: -0.02em;
  }

  .summary-count span { color: var(--red); }

  .progress-track {
    height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--red), var(--yellow-hi));
    transition: width 0.5s cubic-bezier(0.34,1.2,0.64,1);
  }

  /* ADD */
  .add-section {
    display: flex;
    gap: 0.45rem;
    margin-bottom: 1.1rem;
  }

  .add-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.7rem 0.95rem;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  .add-input::placeholder { color: var(--muted); }

  .add-input:focus {
    border-color: rgba(220,38,38,0.45);
    box-shadow: 0 0 0 3px var(--red-dim);
  }

  .add-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 0.7rem 1.1rem;
    font-family: var(--font);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s, transform 0.1s;
  }

  .add-btn:hover { background: #b91c1c; }
  .add-btn:active { transform: scale(0.96); }

  .error-msg {
    color: var(--red-hi);
    font-size: 0.76rem;
    font-weight: 500;
    margin-top: -0.7rem;
    margin-bottom: 0.9rem;
    padding-left: 0.2rem;
    animation: shake 0.28s ease;
  }

  /* HABITS LIST */
  #habits-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 0.88rem;
    line-height: 1.7;
  }

  .empty-state strong { color: var(--text2); font-weight: 500; }

  /* HABIT CARD */
  .habit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    transition: border-color 0.2s;
  }

  .habit-card.done { border-color: rgba(220,38,38,0.18); }
  .habit-card.drag-over { border-color: var(--red); box-shadow: 0 0 0 2px var(--red-dim); }
  .habit-card.dragging { opacity: 0.35; }

  .habit-color-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }

  .habit-main-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.8rem 0.9rem 0.8rem 0.85rem;
  }

  .drag-handle {
    color: var(--muted);
    cursor: grab;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .habit-card:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle svg { width: 13px; height: 13px; }

  /* CHECKBOX */
  .habit-check {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    min-width: 20px;
    border-radius: 5px;
    border: 1.5px solid var(--border-hi);
    background: var(--surface2);
    cursor: pointer;
    position: relative;
    transition: border-color 0.15s, background 0.15s, transform 0.12s;
    flex-shrink: 0;
  }

  .habit-check:hover { border-color: var(--red); transform: scale(1.07); }

  .habit-check:checked {
    background: var(--red);
    border-color: var(--red);
    animation: pop 0.25s cubic-bezier(0.34,1.5,0.64,1);
  }

  .habit-check:checked::after {
    content: '';
    position: absolute;
    left: 5px; top: 2px;
    width: 5px; height: 9px;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(45deg);
  }

  .emoji-btn {
    background: none;
    border: none;
    font-size: 1rem;
    cursor: pointer;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    transition: background 0.12s;
    flex-shrink: 0;
    line-height: 1;
  }

  .emoji-btn:hover { background: var(--surface3); }

  .habit-info { flex: 1; min-width: 0; }

  .habit-name {
    font-size: 0.88rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    transition: color 0.2s;
  }

  .habit-card.done .habit-name {
    color: var(--text2);
    text-decoration: line-through;
    text-decoration-color: var(--muted);
  }

  .habit-streak {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.12rem;
    display: flex;
    align-items: center;
    gap: 0.18rem;
  }

  .habit-streak.hot { color: var(--yellow-hi); }

  .habit-actions {
    display: flex;
    align-items: center;
    gap: 0.15rem;
    flex-shrink: 0;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 5px;
    transition: color 0.15s, background 0.15s;
    flex-shrink: 0;
  }

  .icon-btn:hover { color: var(--text2); background: var(--surface3); }
  .icon-btn.delete:hover { color: var(--red-hi); background: var(--red-dim); }
  .icon-btn svg { width: 13px; height: 13px; }

  /* POPOVERS */
  .popover {
    position: fixed;
    z-index: 1000;
    background: var(--surface2);
    border: 1px solid var(--border-hi);
    border-radius: 10px;
    box-shadow: 0 10px 36px rgba(0,0,0,0.6);
    animation: popIn 0.12s ease;
  }

  .emoji-picker { padding: 0.55rem; width: 210px; }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 1px;
  }

  .emoji-option {
    background: none;
    border: none;
    font-size: 0.95rem;
    cursor: pointer;
    width: 23px;
    height: 23px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: background 0.1s;
    line-height: 1;
  }

  .emoji-option:hover { background: var(--surface3); }

  .color-picker { padding: 0.6rem 0.65rem; width: 152px; }

  .color-picker-title {
    font-size: 0.66rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.45rem;
  }

  .color-grid { display: flex; flex-wrap: wrap; gap: 5px; }

  .color-swatch {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s, border-color 0.12s;
    flex-shrink: 0;
  }

  .color-swatch:hover { transform: scale(1.18); }
  .color-swatch.active { border-color: var(--text) !important; }
  .color-swatch.none { background: var(--surface3) !important; border: 1.5px dashed var(--muted) !important; }

  /* YEAR CALENDAR */
  .year-cal-section {
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .year-cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .year-cal-title {
    font-size: 0.68rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .year-cal-legend {
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .legend-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  .year-cal-scroll {
    overflow-x: auto;
    padding-bottom: 0.5rem;
  }

  .year-cal-scroll::-webkit-scrollbar { height: 3px; }
  .year-cal-scroll::-webkit-scrollbar-track { background: transparent; }
  .year-cal-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }

  .year-cal-inner {
    display: flex;
    gap: 0;
  }

  /* Day-of-week label column */
  .cal-dow-col {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-right: 4px;
    flex-shrink: 0;
  }

  .cal-dow-spacer {
    height: 14px; /* matches month label row */
  }

  .cal-dow-label {
    width: 16px;
    height: 11px;
    font-size: 0.55rem;
    color: var(--muted);
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    letter-spacing: 0.02em;
  }

  /* Weeks grid */
  #year-calendar {
    display: flex;
    gap: 2px;
  }

  .cal-week {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }

  .cal-month-label {
    height: 14px;
    font-size: 0.6rem;
    color: var(--text2);
    font-weight: 600;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    white-space: nowrap;
    padding-left: 1px;
  }

  .cal-day {
    width: 11px;
    height: 11px;
    border-radius: 2px;
    cursor: default;
    transition: opacity 0.1s;
  }

  .cal-day:hover { opacity: 0.8; }
  .cal-day.empty { background: transparent !important; }
  .cal-day.future { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.04); }
  .cal-day.past-none { background: var(--surface2); }
  .cal-day.level-1 { background: #6b1d1d; }
  .cal-day.level-2 { background: #991b1b; }
  .cal-day.level-3 { background: #dc2626; }
  .cal-day.level-all { background: #eab308; }
  .cal-day.is-today { outline: 1.5px solid var(--text2); outline-offset: 1px; }

  /* FIREWORKS CANVAS */
  #confetti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
  }

  /* KEYFRAMES */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-5px); }
    75%      { transform: translateX(5px); }
  }

  @keyframes pop {
    0%   { transform: scale(0.75); }
    60%  { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes slideOut {
    to { opacity: 0; transform: translateX(18px) scale(0.95); max-height: 0; overflow: hidden; }
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.94) translateY(-3px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="container">
  <header>
    <div class="header-top">
      <h1>habit<span class="dot">.</span></h1>
      <span class="today-date" id="today-label"></span>
    </div>
  </header>

  <div class="summary">
    <div class="summary-label">Today's Progress</div>
    <div class="summary-count" id="summary-count"><span>0</span> / 0 done</div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="add-section">
    <input class="add-input" id="habit-input" type="text"
      placeholder="New habit..." maxlength="60" autocomplete="off" />
    <button class="add-btn" id="add-btn">Add</button>
  </div>
  <div class="error-msg" id="error-msg" style="display:none"></div>

  <div id="habits-list"></div>

  <!-- Year Calendar -->
  <div class="year-cal-section" id="cal-section" style="display:none">
    <div class="year-cal-header">
      <span class="year-cal-title">This Year</span>
      <div class="year-cal-legend">
        <span class="legend-label">less</span>
        <div class="legend-swatch" style="background:var(--surface2)"></div>
        <div class="legend-swatch" style="background:#6b1d1d"></div>
        <div class="legend-swatch" style="background:#991b1b"></div>
        <div class="legend-swatch" style="background:#dc2626"></div>
        <div class="legend-swatch" style="background:#eab308"></div>
        <span class="legend-label">more</span>
      </div>
    </div>
    <div class="year-cal-scroll">
      <div class="year-cal-inner">
        <div class="cal-dow-col" id="cal-dow-col"></div>
        <div id="year-calendar"></div>
      </div>
    </div>
  </div>
</div>

<div class="popover emoji-picker" id="emoji-picker" style="display:none">
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<div class="popover color-picker" id="color-picker" style="display:none">
  <div class="color-picker-title">Label Color</div>
  <div class="color-grid" id="color-grid"></div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'ht_v3_data';

const EMOJIS = [
  '🏃','💪','🧘','🚴','🏋️','🤸','🥗','💧',
  '🍎','🥦','📚','✍️','🎯','💻','🎨','🎵',
  '🧠','💡','📝','📖','😴','🌅','🌙','☀️',
  '🌿','🌱','🦷','🛁','💊','❤️','🔥','⭐',
  '✨','🎉','🏆','💰','🙏','🧹','🐕','🐈',
];

const LABEL_COLORS = [
  { id: 'none',   hex: null },
  { id: 'red',    hex: '#dc2626' },
  { id: 'orange', hex: '#ea580c' },
  { id: 'yellow', hex: '#ca8a04' },
  { id: 'lime',   hex: '#4d7c0f' },
  { id: 'green',  hex: '#15803d' },
  { id: 'cyan',   hex: '#0e7490' },
  { id: 'blue',   hex: '#1d4ed8' },
  { id: 'purple', hex: '#6d28d9' },
  { id: 'pink',   hex: '#be185d' },
  { id: 'gray',   hex: '#4b5563' },
  { id: 'white',  hex: '#9ca3af' },
];

// ── Storage ──────────────────────────────────────────────────────────────────
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

// ── Date helpers ─────────────────────────────────────────────────────────────
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function offsetDay(dateStr, n) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function dateToStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDisplayDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
}

// ── State ────────────────────────────────────────────────────────────────────
let state = loadData();
if (!state.habits) state.habits = [];

const TODAY = todayStr();

// Migrate / integrity
state.habits.forEach(h => {
  if (!h.history) h.history = h.lastChecked ? [h.lastChecked] : [];
  if (!h.emoji)   h.emoji   = '⭐';
  if (!h.color)   h.color   = 'none';
  if (h.lastChecked && h.lastChecked !== TODAY && h.lastChecked !== offsetDay(TODAY, -1)) {
    h.streak = 0;
  }
});
saveData(state);

// ── DOM refs ─────────────────────────────────────────────────────────────────
const listEl        = document.getElementById('habits-list');
const inputEl       = document.getElementById('habit-input');
const addBtn        = document.getElementById('add-btn');
const errEl         = document.getElementById('error-msg');
const countEl       = document.getElementById('summary-count');
const fillEl        = document.getElementById('progress-fill');
const todayLbl      = document.getElementById('today-label');
const emojiPickerEl = document.getElementById('emoji-picker');
const colorPickerEl = document.getElementById('color-picker');
const calSection    = document.getElementById('cal-section');

todayLbl.textContent = formatDisplayDate(TODAY);

// ── Popover management ────────────────────────────────────────────────────────
let activePopover = null;
let activeHabitId = null;

function closePopovers() {
  emojiPickerEl.style.display = 'none';
  colorPickerEl.style.display = 'none';
  activePopover = null;
  activeHabitId = null;
}

document.addEventListener('click', e => {
  if (activePopover && !activePopover.contains(e.target)) closePopovers();
});

function positionPopover(el, trigger) {
  el.style.display = 'block';
  const tr = trigger.getBoundingClientRect();
  const ep = el.getBoundingClientRect();
  let top  = tr.bottom + 5;
  let left = tr.left;
  if (left + ep.width > window.innerWidth - 8) left = window.innerWidth - ep.width - 8;
  if (top + ep.height > window.innerHeight - 8) top = tr.top - ep.height - 5;
  el.style.top  = top  + 'px';
  el.style.left = left + 'px';
}

// ── Build emoji grid ──────────────────────────────────────────────────────────
const emojiGrid = document.getElementById('emoji-grid');
EMOJIS.forEach(em => {
  const btn = document.createElement('button');
  btn.className = 'emoji-option';
  btn.textContent = em;
  btn.addEventListener('click', e => {
    e.stopPropagation();
    if (activeHabitId) {
      const h = state.habits.find(x => x.id === activeHabitId);
      if (h) { h.emoji = em; saveData(state); renderHabitEmoji(h.id, em); }
    }
    closePopovers();
  });
  emojiGrid.appendChild(btn);
});

// ── Build color grid ──────────────────────────────────────────────────────────
const colorGrid = document.getElementById('color-grid');
LABEL_COLORS.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch' + (c.id === 'none' ? ' none' : '');
  sw.dataset.colorId = c.id;
  sw.title = c.id;
  if (c.hex) sw.style.background = c.hex;
  sw.addEventListener('click', e => {
    e.stopPropagation();
    if (activeHabitId) {
      const h = state.habits.find(x => x.id === activeHabitId);
      if (h) { h.color = c.id; saveData(state); render(); }
    }
    closePopovers();
  });
  colorGrid.appendChild(sw);
});

// ── Render habits ─────────────────────────────────────────────────────────────
function render() {
  listEl.innerHTML = '';

  if (state.habits.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><strong>No habits yet.</strong><br>Add one above to get started.</div>`;
    calSection.style.display = 'none';
    updateSummary();
    return;
  }

  calSection.style.display = '';

  state.habits.forEach((h, idx) => {
    const done     = h.lastChecked === TODAY;
    const colorObj = LABEL_COLORS.find(c => c.id === h.color) || LABEL_COLORS[0];
    const hot      = h.streak >= 3;

    const card = document.createElement('div');
    card.className   = 'habit-card' + (done ? ' done' : '');
    card.dataset.id  = h.id;
    card.dataset.idx = idx;
    card.draggable   = true;
    card.style.animation = 'slideIn 0.28s ease both';

    card.innerHTML = `
      ${colorObj.hex ? `<div class="habit-color-bar" style="background:${colorObj.hex}"></div>` : ''}
      <div class="habit-main-row">
        <span class="drag-handle" title="Drag to reorder">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <circle cx="5" cy="3"  r="1.2"/><circle cx="11" cy="3"  r="1.2"/>
            <circle cx="5" cy="8"  r="1.2"/><circle cx="11" cy="8"  r="1.2"/>
            <circle cx="5" cy="13" r="1.2"/><circle cx="11" cy="13" r="1.2"/>
          </svg>
        </span>
        <input type="checkbox" class="habit-check" ${done ? 'checked' : ''}
          aria-label="Mark ${escHtml(h.name)} done">
        <button class="emoji-btn" title="Change emoji">${h.emoji}</button>
        <div class="habit-info">
          <div class="habit-name">${escHtml(h.name)}</div>
          <div class="habit-streak${hot ? ' hot' : ''}">🔥 ${h.streak} day streak</div>
        </div>
        <div class="habit-actions">
          <button class="icon-btn color-action" title="Label color">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="8" r="6"/>
              <circle cx="8" cy="8" r="2.5" fill="currentColor" stroke="none"/>
            </svg>
          </button>
          <button class="icon-btn delete" aria-label="Delete ${escHtml(h.name)}">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M2 4h12M6 4V2.5h4V4M5.5 4l.5 9h4l.5-9"/>
            </svg>
          </button>
        </div>
      </div>`;

    card.querySelector('.habit-check').addEventListener('change', e => toggle(h.id, e.target.checked));

    card.querySelector('.emoji-btn').addEventListener('click', e => {
      e.stopPropagation();
      if (activePopover === emojiPickerEl && activeHabitId === h.id) { closePopovers(); return; }
      closePopovers();
      activeHabitId = h.id;
      activePopover = emojiPickerEl;
      positionPopover(emojiPickerEl, e.currentTarget);
    });

    card.querySelector('.color-action').addEventListener('click', e => {
      e.stopPropagation();
      if (activePopover === colorPickerEl && activeHabitId === h.id) { closePopovers(); return; }
      closePopovers();
      activeHabitId = h.id;
      activePopover = colorPickerEl;
      colorGrid.querySelectorAll('.color-swatch').forEach(sw => {
        sw.classList.toggle('active', sw.dataset.colorId === h.color);
      });
      positionPopover(colorPickerEl, e.currentTarget);
    });

    card.querySelector('.delete').addEventListener('click', () => deleteHabit(h.id, card));

    card.addEventListener('dragstart',  onDragStart);
    card.addEventListener('dragend',    onDragEnd);
    card.addEventListener('dragover',   onDragOver);
    card.addEventListener('dragleave',  onDragLeave);
    card.addEventListener('drop',       onDrop);

    listEl.appendChild(card);
  });

  updateSummary();
  renderCalendar();
}

function renderHabitEmoji(id, em) {
  const card = listEl.querySelector(`[data-id="${id}"]`);
  if (card) card.querySelector('.emoji-btn').textContent = em;
}

function updateSummary() {
  const total = state.habits.length;
  const done  = state.habits.filter(h => h.lastChecked === TODAY).length;
  const pct   = total ? Math.round((done / total) * 100) : 0;
  countEl.innerHTML = `<span>${done}</span> / ${total} done today`;
  fillEl.style.width = pct + '%';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Year Calendar ─────────────────────────────────────────────────────────────
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW_LABELS  = ['Mo','Tu','We','Th','Fr','Sa','Su'];

function renderCalendar() {
  const calEl    = document.getElementById('year-calendar');
  const dowCol   = document.getElementById('cal-dow-col');
  calEl.innerHTML  = '';
  dowCol.innerHTML = '';

  const year  = new Date(TODAY + 'T12:00:00').getFullYear();
  const start = new Date(year, 2, 1);   // March 1
  const end   = new Date(year, 11, 31); // Dec 31
  const todayD = new Date(TODAY + 'T12:00:00');

  // Build completion map: dateStr -> count of habits done
  const compMap = {};
  const totalHabits = state.habits.length;
  state.habits.forEach(h => {
    (h.history || []).forEach(d => {
      compMap[d] = (compMap[d] || 0) + 1;
    });
  });

  // Find Monday on or before March 1 (week start = Monday)
  const gridStart = new Date(start);
  const dow = gridStart.getDay(); // 0=Sun
  const backDays = dow === 0 ? 6 : dow - 1;
  gridStart.setDate(gridStart.getDate() - backDays);

  // Day-of-week label column
  const spacer = document.createElement('div');
  spacer.className = 'cal-dow-spacer';
  dowCol.appendChild(spacer);
  DOW_LABELS.forEach(label => {
    const d = document.createElement('div');
    d.className   = 'cal-dow-label';
    d.textContent = label;
    dowCol.appendChild(d);
  });

  // Build week columns
  const cur = new Date(gridStart);
  while (cur <= end) {
    const weekCol = document.createElement('div');
    weekCol.className = 'cal-week';

    // Month label for this week
    const labelEl = document.createElement('div');
    labelEl.className = 'cal-month-label';
    // Show month name if the 1st of any month falls in this week
    for (let i = 0; i < 7; i++) {
      const d = new Date(cur);
      d.setDate(d.getDate() + i);
      if (d.getDate() === 1 && d >= start && d <= end) {
        labelEl.textContent = MONTH_NAMES[d.getMonth()];
        break;
      }
    }
    weekCol.appendChild(labelEl);

    // 7 day cells (Mon–Sun)
    for (let i = 0; i < 7; i++) {
      const d = new Date(cur);
      d.setDate(d.getDate() + i);
      const cell = document.createElement('div');
      cell.className = 'cal-day';

      if (d < start || d > end) {
        cell.classList.add('empty');
      } else {
        const ds    = dateToStr(d);
        const count = compMap[ds] || 0;
        const isToday  = ds === TODAY;
        const isFuture = d > todayD;

        if (isToday)       cell.classList.add('is-today');
        if (isFuture) {
          cell.classList.add('future');
        } else if (count === 0) {
          cell.classList.add('past-none');
        } else if (totalHabits > 0 && count >= totalHabits) {
          cell.classList.add('level-all');
        } else if (count >= 3) {
          cell.classList.add('level-3');
        } else if (count === 2) {
          cell.classList.add('level-2');
        } else {
          cell.classList.add('level-1');
        }

        cell.title = `${ds}  ${count}${totalHabits ? '/' + totalHabits : ''} habits`;
      }

      weekCol.appendChild(cell);
    }

    calEl.appendChild(weekCol);
    cur.setDate(cur.getDate() + 7);
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
function addHabit() {
  const name = inputEl.value.trim();
  if (!name) { showError('Please enter a habit name.'); return; }
  if (state.habits.some(h => h.name.toLowerCase() === name.toLowerCase())) {
    showError('That habit already exists.'); return;
  }
  hideError();
  state.habits.push({
    id: Date.now().toString(36),
    name,
    emoji:       '⭐',
    color:       'none',
    streak:      0,
    lastChecked: null,
    createdAt:   TODAY,
    history:     [],
  });
  saveData(state);
  inputEl.value = '';
  render();
  const cards = listEl.querySelectorAll('.habit-card');
  if (cards.length) cards[cards.length-1].scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function toggle(id, checked) {
  const h = state.habits.find(x => x.id === id);
  if (!h) return;

  const yesterday = offsetDay(TODAY, -1);
  if (checked) {
    h.streak      = h.lastChecked === yesterday ? h.streak + 1 : 1;
    h.lastChecked = TODAY;
    if (!h.history.includes(TODAY)) h.history.push(TODAY);
  } else {
    h.streak      = Math.max(0, h.streak - 1);
    h.lastChecked = h.streak > 0 ? yesterday : null;
    h.history     = h.history.filter(d => d !== TODAY);
  }
  saveData(state);

  // In-place card update
  const card = listEl.querySelector(`[data-id="${id}"]`);
  if (card) {
    card.classList.toggle('done', checked);
    const streakEl = card.querySelector('.habit-streak');
    if (streakEl) {
      streakEl.className = 'habit-streak' + (h.streak >= 3 ? ' hot' : '');
      streakEl.innerHTML = `🔥 ${h.streak} day streak`;
    }
  }

  updateSummary();
  renderCalendar();

  if (checked) {
    const total = state.habits.length;
    const done  = state.habits.filter(x => x.lastChecked === TODAY).length;
    if (total > 0 && done === total) {
      launchFireworks();
    } else {
      launchBurst();
    }
  }
}

function deleteHabit(id, cardEl) {
  cardEl.style.animation = 'slideOut 0.22s ease forwards';
  setTimeout(() => {
    state.habits = state.habits.filter(h => h.id !== id);
    saveData(state);
    render();
  }, 210);
}

// ── Error ─────────────────────────────────────────────────────────────────────
let errTimer;
function showError(msg) {
  errEl.textContent = msg;
  errEl.style.display = 'block';
  clearTimeout(errTimer);
  errTimer = setTimeout(hideError, 3000);
  inputEl.focus();
}
function hideError() { errEl.style.display = 'none'; errEl.textContent = ''; }

// ── Events ────────────────────────────────────────────────────────────────────
addBtn.addEventListener('click', addHabit);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });
inputEl.addEventListener('input', hideError);

// ── Drag & Drop ───────────────────────────────────────────────────────────────
let dragSrcIdx = null;

function onDragStart(e) {
  dragSrcIdx = parseInt(e.currentTarget.dataset.idx);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  listEl.querySelectorAll('.habit-card').forEach(c => c.classList.remove('drag-over'));
  dragSrcIdx = null;
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  listEl.querySelectorAll('.habit-card').forEach(c => c.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  const targetIdx = parseInt(e.currentTarget.dataset.idx);
  if (dragSrcIdx === null || dragSrcIdx === targetIdx) return;
  const [moved] = state.habits.splice(dragSrcIdx, 1);
  state.habits.splice(targetIdx, 0, moved);
  saveData(state);
  render();
}

// ── Canvas / Fireworks ────────────────────────────────────────────────────────
const canvas = document.getElementById('confetti-canvas');
const ctx    = canvas.getContext('2d');

let rockets  = [];
let sparks   = [];
let bursters = [];
let fwRAF    = null;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const FW_PALETTES = [
  ['#ef4444','#fca5a5','#ffffff'],
  ['#eab308','#fde047','#ffffff'],
  ['#f97316','#fdba74','#ffffff'],
  ['#dc2626','#eab308','#ffffff'],
  ['#fbbf24','#ef4444','#ffffff'],
];

function randPalette() {
  return FW_PALETTES[Math.floor(Math.random() * FW_PALETTES.length)];
}

// Small burst for single habit
function launchBurst() {
  resizeCanvas();
  const cx = canvas.width / 2;
  const cy = canvas.height * 0.45;
  const colors = ['#ef4444','#eab308','#ffffff','#fbbf24'];
  for (let i = 0; i < 32; i++) {
    const angle = (i / 32) * Math.PI * 2;
    const spd   = Math.random() * 5 + 2;
    bursters.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: 1,
      size:  Math.random() * 2.5 + 1,
      decay: 0.028 + Math.random() * 0.012,
    });
  }
  if (!fwRAF) animateFW();
}

// Full fireworks for all habits done
function launchFireworks() {
  resizeCanvas();
  const count = 6 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const palette = randPalette();
      rockets.push({
        x:       canvas.width * (0.15 + Math.random() * 0.7),
        y:       canvas.height + 10,
        vx:      (Math.random() - 0.5) * 1.5,
        vy:      -(13 + Math.random() * 7),
        targetY: canvas.height * (0.08 + Math.random() * 0.32),
        palette,
        trail:   [],
        done:    false,
      });
      if (!fwRAF) animateFW();
    }, i * 280 + Math.random() * 120);
  }
}

function explodeRocket(x, y, palette) {
  const count = 80 + Math.floor(Math.random() * 50);
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    const spd   = (Math.random() * 4.5 + 1.5) * (Math.random() > 0.3 ? 1 : 0.4);
    sparks.push({
      x, y,
      vx:    Math.cos(angle) * spd,
      vy:    Math.sin(angle) * spd,
      color: palette[Math.floor(Math.random() * palette.length)],
      alpha: 1,
      size:  Math.random() * 2.2 + 0.8,
      decay: 0.010 + Math.random() * 0.014,
      trail: [],
    });
  }
  // Add a few glitter sparks that fall slower
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    sparks.push({
      x, y,
      vx:    Math.cos(angle) * (Math.random() * 1.5),
      vy:    Math.sin(angle) * (Math.random() * 1.5) - 1,
      color: '#ffffff',
      alpha: 1,
      size:  Math.random() * 1.5 + 0.5,
      decay: 0.006 + Math.random() * 0.008,
      trail: [],
    });
  }
}

function animateFW() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Rockets
  rockets = rockets.filter(r => !r.done);
  for (const r of rockets) {
    r.trail.unshift({ x: r.x, y: r.y });
    if (r.trail.length > 14) r.trail.pop();
    r.x  += r.vx;
    r.y  += r.vy;
    r.vy += 0.22; // drag slows ascent

    // Trail
    r.trail.forEach((p, i) => {
      ctx.globalAlpha = (1 - i / r.trail.length) * 0.65;
      ctx.fillStyle   = r.palette[0];
      const s = Math.max(0.5, 2 - i * 0.15);
      ctx.fillRect(p.x - s/2, p.y, s, s * 2);
    });

    // Head glow
    ctx.globalAlpha = 1;
    ctx.fillStyle   = '#ffffff';
    ctx.beginPath();
    ctx.arc(r.x, r.y, 2.5, 0, Math.PI * 2);
    ctx.fill();

    if (r.y <= r.targetY) {
      r.done = true;
      explodeRocket(r.x, r.y, r.palette);
    }
  }

  // Explosion sparks
  sparks = sparks.filter(s => s.alpha > 0.02);
  for (const s of sparks) {
    s.trail.unshift({ x: s.x, y: s.y });
    if (s.trail.length > 6) s.trail.pop();
    s.x   += s.vx;
    s.y   += s.vy;
    s.vy  += 0.09;  // gravity
    s.vx  *= 0.985;
    s.alpha -= s.decay;

    // Trail
    s.trail.forEach((p, i) => {
      ctx.globalAlpha = s.alpha * (1 - i / s.trail.length) * 0.4;
      ctx.fillStyle   = s.color;
      ctx.fillRect(p.x - s.size/2, p.y - s.size/2, s.size, s.size);
    });

    // Spark dot
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle   = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Small bursters
  bursters = bursters.filter(b => b.alpha > 0.02);
  for (const b of bursters) {
    b.x    += b.vx;
    b.y    += b.vy;
    b.vy   += 0.12;
    b.vx   *= 0.97;
    b.alpha -= b.decay;

    ctx.globalAlpha = b.alpha;
    ctx.fillStyle   = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;

  if (rockets.length || sparks.length || bursters.length) {
    fwRAF = requestAnimationFrame(animateFW);
  } else {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    fwRAF = null;
  }
}

// ── Midnight reset ────────────────────────────────────────────────────────────
function scheduleMidnightReset() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  setTimeout(() => {
    const newToday = todayStr();
    state = loadData();
    state.habits.forEach(h => {
      if (h.lastChecked && h.lastChecked !== newToday && h.lastChecked !== offsetDay(newToday, -1)) {
        h.streak = 0;
      }
    });
    saveData(state);
    todayLbl.textContent = formatDisplayDate(newToday);
    render();
    scheduleMidnightReset();
  }, midnight - now + 500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
render();
scheduleMidnightReset();
</script>
